<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fondo circular con gradiente indigo -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <!-- Icono de enlace/cadena (link) en blanco -->
  <!-- Eslabón izquierdo -->
  <rect x="8" y="26" width="20" height="12" rx="6" fill="none" stroke="white" stroke-width="4"/>
  <!-- Eslabón derecho -->
  <rect x="36" y="26" width="20" height="12" rx="6" fill="none" stroke="white" stroke-width="4"/>
  <!-- Conector central -->
  <line x1="26" y1="32" x2="38" y2="32" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Punto de pulso arriba a la derecha -->
  <circle cx="52" cy="14" r="5" fill="#34d399"/>
  <circle cx="52" cy="14" r="5" fill="none" stroke="#34d399" stroke-width="2" opacity="0.5">
    <animate attributeName="r" from="5" to="11" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.5" to="0" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
