# ── Configuración HTTPS final ───────────────────────────────────────────────────
# Activa este archivo DESPUÉS de obtener el certificado con Certbot.

upstream django {
    server web:8000;
}

# Redirige HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name urlmonitor.xyz www.urlmonitor.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS principal
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name urlmonitor.xyz www.urlmonitor.xyz;

    ssl_certificate     /etc/letsencrypt/live/urlmonitor.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/urlmonitor.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    client_max_body_size 10M;

    # Archivos estáticos
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
    }

    # Archivos media (avatares, etc.)
    location /media/ {
        alias /app/media/;
        expires 7d;
        access_log off;
    }

    # Django (Gunicorn)
    location / {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 60s;
    }
}
