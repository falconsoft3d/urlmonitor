# ── Paso 1: HTTP temporal para obtener el certificado ──────────────────────────
# Usa este archivo ANTES de tener el certificado SSL.
# Una vez obtenido, reemplázalo con urlmonitor.xyz.conf (el archivo HTTPS).

server {
    listen 80;
    listen [::]:80;
    server_name urlmonitor.xyz www.urlmonitor.xyz;

    # Ruta de validación Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demás redirige a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
