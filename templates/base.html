<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}URLMonitor{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            indigo: {
              50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
              300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
              600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-indigo-700 shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">

        <!-- Logo -->
        <div class="flex items-center">
          <a href="{% url 'home' %}" class="flex items-center gap-2 text-white font-bold text-xl shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
            URLMonitor
          </a>
        </div>

        <!-- User actions -->
        <div class="flex items-center gap-3">
          {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}"
              class="bg-white text-indigo-700 hover:bg-indigo-50 px-4 py-2 rounded-lg text-sm font-semibold transition shadow">
              Dashboard
            </a>
          {% else %}
            <a href="{% url 'login' %}"
              class="text-indigo-200 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition">
              Iniciar sesión
            </a>
            <a href="{% url 'register' %}"
              class="bg-white text-indigo-700 hover:bg-indigo-50 px-4 py-2 rounded-lg text-sm font-semibold transition shadow">
              Registrarse
            </a>
          {% endif %}
        </div>

      </div>
    </div>
  </nav>

  <!-- Flash messages -->
  {% if messages %}
  <div class="max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 mt-4 space-y-2">
    {% for message in messages %}
    <div class="flex items-center justify-between px-4 py-3 rounded-lg border text-sm
      {% if message.tags == 'success' %}bg-green-50 text-green-800 border-green-200
      {% elif message.tags == 'error' %}bg-red-50 text-red-800 border-red-200
      {% elif message.tags == 'warning' %}bg-yellow-50 text-yellow-800 border-yellow-200
      {% else %}bg-blue-50 text-blue-800 border-blue-200{% endif %}">
      <span>{{ message }}</span>
      <button onclick="this.parentElement.remove()" class="ml-4 opacity-50 hover:opacity-100 text-lg leading-none">&times;</button>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <!-- Page content -->
  <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-200 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5">
      <p class="text-center text-gray-400 text-sm">
        © 2026 URLMonitor &mdash; Monitoreo de disponibilidad web
      </p>
    </div>
  </footer>

</body>
</html>
